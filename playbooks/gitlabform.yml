---
- name: GitLab Configuration as Code - Root Execution
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    gitlab_url: "http://gitlab.homelab.lan"
    target_scope: "test-group/test-project"
    temporary_access_list:
      - { name: "test-user", role: "developer", expiry: "2026-12-31" }

  tasks:
    - name: Ensure gitlabform is installed
      ansible.builtin.pip:
        name: gitlabform
        state: present
        [cite_start]extra_args: "--user" [cite: 87]

    - name: Run GitLabForm with Inline Config
      # We use a heredoc to feed the config directly into gitlabform via stdin
      ansible.builtin.shell: |
        gitlabform -c - {{ target_scope }} --verbose <<EOF
        config_version: 3
        projects_and_groups:
          "{{ target_scope }}":
            members:
              enforce_members: true
              users:
                admin_user_account:
                  access_level: owner
                {% for user in temporary_access_list %}
                {{ user.name }}:
                  access_level: {{ user.role }}
                  expires_at: "{{ user.expiry }}"
                {% endfor %}
        EOF
      environment:
        GITLAB_URL: "{{ gitlab_url }}"
        GITLAB_TOKEN: "{{ lookup('env', 'GITLAB_TOKEN') }}"
        PATH: "/runner/.local/bin:/usr/local/bin:/usr/bin:{{ ansible_env.PATH | default('') }}"
      register: gitlabform_result
      changed_when: "'Applying' in gitlabform_result.stdout or 'Applied' in gitlabform_result.stdout"

    - name: Final Output
      ansible.builtin.debug:
        msg:
          - "STDOUT: {{ gitlabform_result.stdout }}"
          - "STDERR: {{ gitlabform_result.stderr }}"