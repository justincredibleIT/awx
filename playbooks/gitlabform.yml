---
- name: GitLab Configuration as Code - Specific Project
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # URL of your specific instance
    gitlab_url: "http://gitlab.homelab.lan"
    gitlab_token: "{{ lookup('env', 'GITLAB_TOKEN') }}"
    
    # Targeting ONLY the test project
    target_scope: "test-group/test-project"

    # Defining the specific user
    temporary_access_list:
      - { name: "test-user", role: "developer", expiry: "2026-12-31" }

  tasks:
    - name: Create temp directory for config
      file:
        path: "./gitlabform_temp"
        state: directory

    - name: Generate GitLabForm Configuration
      template:
        src: config.yml.j2
        dest: "./gitlabform_temp/config.yml"

    - name: Run GitLabForm
      community.docker.docker_container:
        name: gitlabform_apply
        image: ghcr.io/gitlabform/gitlabform:latest
        cleanup: true
        detach: false
        volumes:
          - "{{ playbook_dir }}/gitlabform_temp:/config"
        env:
          GITLAB_TOKEN: "{{ gitlab_token }}"
          # Since it's a .lan address, ensure the container can resolve it
        command: "gitlabform {{ target_scope }}"
      register: result

    - name: Result Output
      debug:
        msg: "{{ result.container.Output }}"