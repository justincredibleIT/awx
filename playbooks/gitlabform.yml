---
- name: GitLab Configuration as Code - Specific Project
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # URL of your specific instance
    gitlab_url: "http://gitlab.homelab.lan"
    
    # Target path: group/project
    target_scope: "test-group/test-project"

    # Defining the specific user for Time-Based Access
    temporary_access_list:
      - { name: "test-user", role: "developer", expiry: "2026-12-31" }

  tasks:
    - name: Create temp directory for config
      file:
        path: "{{ playbook_dir }}/gitlabform_temp"
        state: directory

    - name: Ensure gitlabform is installed
      pip:
        name: gitlabform
        state: present
        extra_args: "--user"

    - name: Generate GitLabForm Configuration from Template
      template:
        # Matches your tree layout: templates/config.yml.j2
        src: templates/config.yml.j2
        dest: "{{ playbook_dir }}/gitlabform_temp/config.yml"

    - name: Run GitLabForm
      # GitLabForm looks for 'config.yml' in the current working directory
      shell: "gitlabform {{ target_scope }}"
      args:
        chdir: "{{ playbook_dir }}/gitlabform_temp"
      environment:
        GITLAB_TOKEN: "{{ lookup('env', 'GITLAB_TOKEN') }}"
        # Injected path to find the 'gitlabform' binary installed via pip --user
        PATH: "/runner/.local/bin:/usr/local/bin:/usr/bin:{{ ansible_env.PATH | default('') }}"
      register: gitlabform_result
      # GitLabForm usually reports changes in stdout; we mark it changed if it applied settings
      changed_when: "'Applying' in gitlabform_result.stdout or 'Applied' in gitlabform_result.stdout"

    - name: Display GitLabForm Output
      debug:
        msg: 
          - "STDOUT: {{ gitlabform_result.stdout }}"
          - "STDERR: {{ gitlabform_result.stderr }}"