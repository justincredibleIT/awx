---
- name: GitLab Configuration as Code - Standardized Fix
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    gitlab_url: "https://gitlab.homelab.lan/"
    target_scope: "test-group/test-project"

  tasks:
    - name: Generate GitLabForm Configuration File
      ansible.builtin.copy:
        dest: /tmp/gitlab_config.yml
        content: |
          config_version: 4

          gitlab:
            url: "{{ gitlab_url }}"
            token: "{{ lookup('env', 'GITLAB_TOKEN') }}"
            ssl_verify: false

          projects_and_groups:
            "{{ target_scope }}":
              members:
                users:
                  test-user:
                    access_level: Developer
                    expires_at: 2026-04-17
                enforce: true
                keep_bots: true

    - name: Run GitLabForm
      ansible.builtin.shell: "gitlabform -c /tmp/gitlab_config.yml {{ target_scope }} -v"
      environment:
        GITLAB_URL: "{{ gitlab_url }}"
        GITLAB_TOKEN: "{{ lookup('env', 'GITLAB_TOKEN') }}"
        # CRITICAL: This bypasses the error seen in job 140
        PYTHONHTTPSVERIFY: "0"
        GITLABFORM_SSL_VERIFY: "false"
        REQUESTS_CA_BUNDLE: ""
      register: gitlabform_result

    - name: Display GitLab Output
      ansible.builtin.debug:
        var: gitlabform_result.stderr_lines