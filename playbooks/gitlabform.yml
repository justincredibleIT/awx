---
- name: GitLab Configuration as Code - Standardized Fix
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    gitlab_url: "http://gitlab.homelab.lan"
    target_scope: "test-group/test-project"

  tasks:
    - name: Ensure gitlabform is installed
      ansible.builtin.pip:
        name: gitlabform
        state: present
        extra_args: "--user"

    - name: Generate GitLabForm Configuration File
      ansible.builtin.copy:
        dest: /tmp/gitlab_config.yml
        content: |
          config_version: 3
          gitlab:
            url: "{{ gitlab_url }}"
            token: "{{ lookup('env', 'GITLAB_TOKEN') }}"
          projects_and_groups:
            "{{ target_scope }}":
              deploy_keys:
                ansible_managed_key:
                  key: "{{ lookup('env', 'SSH_PUBLIC_KEY') | default('MISSING_KEY_CHECK_AWX_CREDENTIAL', true) }}"
                  title: "AWX Managed Deploy Key"
                  can_push: false

    - name: Debug Verify Config File
      ansible.builtin.shell: "cat /tmp/gitlab_config.yml"
      register: debug_config

    - name: Show Config Debug Info
      ansible.builtin.debug:
        msg: "{{ debug_config.stdout_lines }}"

    - name: Run GitLabForm
      ansible.builtin.shell: "gitlabform -c /tmp/gitlab_config.yml {{ target_scope }} --verbose"
      environment:
        GITLAB_URL: "{{ gitlab_url }}"
        GITLAB_TOKEN: "{{ lookup('env', 'GITLAB_TOKEN') }}"
        PATH: "/runner/.local/bin:/usr/local/bin:/usr/bin:{{ ansible_env.PATH | default('') }}"
      register: gitlabform_result
      changed_when: "'Applying' in gitlabform_result.stdout or 'Applied' in gitlabform_result.stdout"

    - name: Display GitLab Output
      ansible.builtin.debug:
        var: gitlabform_result.stdout_lines