---
- name: GitLab Configuration as Code - Standard Run
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    gitlab_url: "http://gitlab.homelab.lan"
    target_scope: "test-group/test-project"

  tasks:
    - name: Ensure gitlabform is installed
      ansible.builtin.pip:
        name: gitlabform
        state: present
        [cite_start]extra_args: "--user" [cite: 36, 52]

    - name: Generate config.yml in playbook root
      ansible.builtin.template:
        src: templates/config.yml.j2
        [cite_start]dest: "{{ playbook_dir }}/config.yml" [cite: 40, 54]

    - name: Run GitLabForm
      # No '-c' needed; it looks for 'config.yml' in the current dir by default
      [cite_start]ansible.builtin.shell: "gitlabform {{ target_scope }} --verbose" [cite: 61]
      args:
        [cite_start]chdir: "{{ playbook_dir }}" [cite: 61]
      environment:
        GITLAB_URL: "{{ gitlab_url }}"
        GITLAB_TOKEN: "{{ lookup('env', 'GITLAB_TOKEN') }}"
        [cite_start]PATH: "/runner/.local/bin:/usr/local/bin:/usr/bin:{{ ansible_env.PATH | default('') }}" [cite: 43, 49]
      register: gitlabform_result