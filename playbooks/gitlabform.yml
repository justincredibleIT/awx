---
- name: GitLab Configuration as Code - Root Execution
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    gitlab_url: "http://gitlab.homelab.lan"
    target_scope: "test-group/test-project"
    temporary_access_list:
      - { name: "test-user", role: "developer", expiry: "2026-12-31" }

  tasks:
    - name: Ensure gitlabform is installed
      pip:
        name: gitlabform
        state: present
        [cite_start]extra_args: "--user" [cite: 5, 36]

    - name: Generate config.yml next to playbook
      template:
        src: templates/config.yml.j2
        [cite_start]dest: "{{ playbook_dir }}/config.yml" [cite: 14, 39]

    - name: Verbosity - Inspect generated config
      shell: |
        echo "Looking for config in: {{ playbook_dir }}"
        ls -la {{ playbook_dir }}/config.yml
        cat {{ playbook_dir }}/config.yml
      [cite_start]register: config_debug [cite: 15, 17]

    - name: Display Config Verbosity
      debug:
        [cite_start]var: config_debug.stdout_lines [cite: 19, 20]

    - name: Run GitLabForm
      # Running directly in the playbook_dir where config.yml now sits
      [cite_start]shell: "gitlabform {{ target_scope }} --verbose" [cite: 8, 40]
      args:
        [cite_start]chdir: "{{ playbook_dir }}" [cite: 9, 41]
      environment:
        GITLAB_URL: "{{ gitlab_url }}"
        GITLAB_TOKEN: "{{ lookup('env', 'GITLAB_TOKEN') }}"
        [cite_start]PATH: "/runner/.local/bin:/usr/local/bin:/usr/bin:{{ ansible_env.PATH | default('') }}" [cite: 1]
      register: gitlabform_result
      changed_when: "'Applying' in gitlabform_result.stdout or 'Applied' in gitlabform_result.stdout"

    - name: Final Output
      debug:
        msg: 
          - "STDOUT: {{ gitlabform_result.stdout }}"
          - [cite_start]"STDERR: {{ gitlabform_result.stderr }}" [cite: 25]