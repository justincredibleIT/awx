---
- name: GitLab Configuration as Code - Specific Project
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    gitlab_url: "http://gitlab.homelab.lan"
    target_scope: "test-group/test-project"
    temporary_access_list:
      - { name: "test-user", role: "developer", expiry: "2026-12-31" }

  tasks:
    - name: Create temp directory for config
      file:
        path: "{{ playbook_dir }}/gitlabform_temp"
        state: directory

    - name: Ensure gitlabform is installed
      pip:
        name: gitlabform
        state: present
        extra_args: "--user"

    - name: Generate GitLabForm Configuration from Template
      template:
        # Use 'templates/' prefix as per your tree layout
        src: templates/config.yml.j2
        dest: "{{ playbook_dir }}/gitlabform_temp/config.yml"

    - name: Run GitLabForm
      shell: "gitlabform --config {{ playbook_dir }}/gitlabform_temp/config.yml {{ target_scope }}"
      # We no longer rely purely on chdir; we point directly to the file
      environment:
        GITLAB_TOKEN: "{{ lookup('env', 'GITLAB_TOKEN') }}"
        PATH: "/runner/.local/bin:/usr/local/bin:/usr/bin:{{ ansible_env.PATH | default('') }}"
      register: gitlabform_result
      changed_when: "'Applying' in gitlabform_result.stdout"

    - name: Display GitLabForm Output
      debug:
        msg: 
          - "STDOUT: {{ gitlabform_result.stdout }}"
          - "STDERR: {{ gitlabform_result.stderr }}"