---
- name: GitLab Configuration as Code - Standardized Fix
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    gitlab_url: "http://gitlab.homelab.lan"
    target_scope: "Internal/glftest1"
    temporary_access_list:
      - { name: test-user, role: Developer, expiry: "2026-04-17" }

  tasks:
    - name: Ensure gitlabform is installed
      ansible.builtin.pip:
        name: gitlabform
        state: present
        extra_args: --user

    - name: Generate config.yml from inline template
      ansible.builtin.copy:
        dest: /tmp/gitlab_config.yml
        content: |
          config_version: 4

          gitlab:
            url: "{{ gitlab_url }}"
            ssl_verify: false

          projects_and_groups:
            "{{ target_scope }}":
              members:
                users:
                  {% for user in temporary_access_list %}
                  {{ user.name }}:
                    access_level: {{ user.role }}
                    expires_at: {{ user.expiry }}
                  {% endfor %}
                enforce: true
                keep_bots: true

    - name: Run GitLabForm
      ansible.builtin.shell: "gitlabform -c /tmp/gitlab_config.yml {{ target_scope }} --verbose"
      environment:
        GITLAB_URL: "{{ gitlab_url }}"
        GITLAB_TOKEN: "{{ lookup('env', 'GITLAB_TOKEN') }}"
        PATH: "/runner/.local/bin:/usr/local/bin:/usr/bin:{{ ansible_env.PATH | default('') }}"
      register: gitlabform_result
      changed_when: "'Applying' in gitlabform_result.stdout or 'Applied' in gitlabform_result.stdout"

    - name: Display GitLab Output
      ansible.builtin.debug:
        var: gitlabform_result.stdout_lines