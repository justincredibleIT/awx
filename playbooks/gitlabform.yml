---
- name: GitLab Configuration as Code - Standardized Fix
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    gitlab_url: "http://gitlab.homelab.lan"
    target_scope: "test-group/test-project"
    temporary_access_list:
      - { name: "test-user", role: "developer", expiry: "2026-12-31" }

  tasks:
    - name: Ensure gitlabform is installed
      ansible.builtin.pip:
        name: gitlabform
        [cite_start]state: present [cite: 251]
        [cite_start]extra_args: "--user" [cite: 252]

    - name: Run GitLabForm with Managed Configuration
      ansible.builtin.shell: |
        cat <<EOF > /tmp/gitlab_config.yml
        config_version: 3
        projects_and_groups:
          "{{ target_scope }}":
            members:
              enforce_members: true
              users:
                admin_user_account:
                  access_level: owner
                {% for user in temporary_access_list %}
                {{ user.name }}:
                  access_level: {{ user.role }}
                  expires_at: "{{ user.expiry }}"
                {% endfor %}
        EOF
        gitlabform -c /tmp/gitlab_config.yml {{ target_scope }} --verbose
      environment:
        GITLAB_URL: "{{ gitlab_url }}"
        GITLAB_TOKEN: "{{ lookup('env', 'GITLAB_TOKEN') }}"
        [cite_start]PATH: "/runner/.local/bin:/usr/local/bin:/usr/bin:{{ ansible_env.PATH | default('') }}" [cite: 258]
      register: gitlabform_result
      changed_when: "'Applying' in gitlabform_result.stdout or 'Applied' in gitlabform_result.stdout"

    - name: Display GitLab Output
      ansible.builtin.debug:
        var: gitlabform_result.stdout_lines