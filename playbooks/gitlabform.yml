---
- name: GitLab Configuration as Code - Path Debugging
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    gitlab_url: "http://gitlab.homelab.lan"
    target_scope: "test-group/test-project"
    temporary_access_list:
      - { name: "test-user", role: "developer", expiry: "2026-12-31" }

  tasks:
    - name: Create temp directory for config
      file:
        path: "{{ playbook_dir }}/gitlabform_temp"
        state: directory
        mode: '0777' # Temporarily wide open to rule out permission issues

    - name: Generate GitLabForm Configuration from Template
      template:
        src: templates/config.yml.j2
        dest: "{{ playbook_dir }}/gitlabform_temp/config.yml"

    - name: Debug Pathing - Let us see the files
      shell: |
        echo "Current User: $(whoami)"
        echo "Current Directory: $(pwd)"
        echo "Listing gitlabform_temp content:"
        ls -la {{ playbook_dir }}/gitlabform_temp/
        cat {{ playbook_dir }}/gitlabform_temp/config.yml
      register: debug_output

    - name: Show Debug Info
      debug:
        var: debug_output.stdout_lines

    - name: Run GitLabForm
      shell: "gitlabform -c {{ playbook_dir }}/gitlabform_temp/config.yml {{ target_scope }}"
      environment:
        GITLAB_TOKEN: "{{ lookup('env', 'GITLAB_TOKEN') }}"
        PATH: "/runner/.local/bin:/usr/local/bin:/usr/bin:{{ ansible_env.PATH | default('') }}"
      register: gitlabform_result
      ignore_errors: true # So we can see the debug output even if this fails

    - name: Final Output
      debug:
        var: gitlabform_result.stderr_lines