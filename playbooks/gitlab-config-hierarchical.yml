---
- name: GitLab Project GitOps Loop (Hierarchical)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    gitlab_url: "http://gitlab.homelab.lan/"
    state_dir: "{{ playbook_dir }}/state_repo"
    # Maps scope "group/sub/proj" to "state_repo/projects/group/sub/proj.yml"
    target_project_file: "{{ state_dir }}/projects/{{ target_scope }}.yml"
    workflow_success: false
    run_provision: false

  pre_tasks:
    - name: Validate Required Parameters
      ansible.builtin.assert:
        that:
          - target_scope is defined and target_scope | length > 0
          - target_user is defined and target_user | length > 0
          - target_action is defined and target_action in ['add', 'update', 'update-expiry', 'remove']
        fail_msg: "Required: target_scope, target_user, target_action."

  tasks:
    - name: 1. Git Pull State Repository
      ansible.builtin.include_role:
        name: git_sync
      vars:
        git_action: pull

    - name: 2. Load Existing Project State
      block:
        - name: Check if Project file exists
          ansible.builtin.stat:
            path: "{{ target_project_file }}"
          register: project_file_stat

        - name: Load Project Data from YAML
          # We use from_yaml here because keys with '/' can be tricky for include_vars
          ansible.builtin.set_fact:
            existing_project_state: "{{ lookup('file', target_project_file) | from_yaml }}"
          when: project_file_stat.stat.exists

        - name: Initialize Empty State if New Project
          ansible.builtin.set_fact:
            existing_project_state: {}
          when: not project_file_stat.stat.exists

    - name: 3. Update and Apply Configuration
      block:
        - name: Load Current Project Facts
          ansible.builtin.set_fact:
            # Look for the specific project key in the file
            current_project_data: "{{ existing_project_state[target_scope] | default({'members': {'enforce': true, 'users': {}}}) }}"

        - name: Build User Config (Add/Update)
          ansible.builtin.set_fact:
            user_config: "{{ {'access_level': target_access_level} | combine({'expires_at': target_expiry} if target_expiry is defined and target_expiry | length > 0 else {}) }}"
          when: target_action in ['add', 'update']

        - name: Build Expiry-Only Config (Update Expiry)
          ansible.builtin.set_fact:
            user_config: "{{ current_project_data.members.users[target_user] | combine({'expires_at': target_expiry}) }}"
          when: target_action == 'update-expiry'

        - name: Process Membership Logic
          ansible.builtin.set_fact:
            updated_users: >-
              {% if target_action == 'remove' %}
                {{ current_project_data.members.users | dict2items | rejectattr('key', 'equalto', target_user) | list | items2dict }}
              {% else %}
                {{ current_project_data.members.users | combine({target_user: user_config}) }}
              {% endif %}

        - name: Construct Final Project Object (No 'projects' key)
          ansible.builtin.set_fact:
            # File starts directly with the scope key for GitLabForm wildcard compatibility
            final_yaml_structure:
              "{{ target_scope }}":
                members:
                  enforce: true
                  users: "{{ updated_users }}"

        - name: 3d. Format YAML and Fix Dates
          ansible.builtin.set_fact:
            yaml_content: "{{ final_yaml_structure | to_nice_yaml(indent=2) | regex_replace(\"expires_at: '([^']+)'\", \"expires_at: \\1\") }}"

        - name: 3e. Ensure Directory Tree Exists
          ansible.builtin.file:
            path: "{{ target_project_file | dirname }}"
            state: directory
            mode: '0755'

        - name: 3f. Write Project State to Disk
          ansible.builtin.copy:
            content: "{{ yaml_content }}"
            dest: "{{ target_project_file }}"
          register: state_updated

        - name: 3g. Provision Project (Optional)
          ansible.builtin.include_role:
            name: gitlab_project_provision
          when: run_provision | bool

        - name: 4. Apply via GitLabForm
          ansible.builtin.include_role:
            name: gitlabform_all_defined
          vars:
            # Role uses target_scope to target the specific run
            fresh_state: "{{ final_yaml_structure }}"

        - name: 5. Git Push (Sync back to remote)
          ansible.builtin.include_role:
            name: git_sync
          vars:
            git_action: push

        - name: 5a. Mark workflow as successful
          ansible.builtin.set_fact:
            workflow_success: true

      rescue:
        - name: Failure Handler
          ansible.builtin.fail:
            msg: "GitOps workflow failed. Check logs above. State preserved at {{ state_dir }}"

    - name: 6. Cleanup (Post-Success)
      ansible.builtin.file:
        path: "{{ state_dir }}"
        state: absent
      when: workflow_success | bool