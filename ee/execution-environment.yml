version: 3

images:
  base_image:
    name: quay.io/ansible/awx-ee:latest

dependencies:
  ansible_core:
    package_pip: ansible-core>=2.15.0
  ansible_runner:
    package_pip: ansible-runner
  galaxy:
    collections:
      - name: community.general
      - name: community.docker
  python:
    - Jinja2>=3.0.0    # <--- Add this to satisfy Ansible's requirement
    - gitlabform
    - python-gitlab
    - docker
  system:
    - gcc
    - python3-devel
    - libxml2-devel
    - libxslt-devel
    - git-core
    - python3-pip

options:
  package_manager_path: /usr/bin/dnf